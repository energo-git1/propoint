<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Propoint v1.1.3</title>
<script src="/react.min.js"></script>
<script src="/react-dom.min.js"></script>
<script src="/babel.min.js"></script>
<script>
Babel.registerPreset('jsx', {
  presets: [[Babel.availablePresets['react'], { runtime: 'classic' }]]
});
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#F0F4F8;color:#1A202C;min-height:100vh}
:root{
  --blue:#2563EB;--blue-dark:#1D4ED8;--blue-light:#EFF6FF;
  --green:#16A34A;--green-light:#F0FDF4;
  --red:#DC2626;--red-light:#FEF2F2;
  --yellow:#D97706;--yellow-light:#FFFBEB;
  --gray:#6B7280;--gray-light:#F9FAFB;--gray-border:#E5E7EB;
  --purple:#7C3AED;--purple-light:#F5F3FF;
  --sidebar-w:240px;
}
/* Layout */
.layout{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:#1E293B;color:#CBD5E1;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid #334155}
.sidebar-logo h1{font-size:22px;font-weight:800;color:#fff;letter-spacing:-0.5px}
.sidebar-logo .version{font-size:11px;color:#64748B;margin-top:2px}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:14px;color:#94A3B8;cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{color:#E2E8F0;background:#253044}
.nav-item.active{color:#fff;background:#253044;border-left-color:var(--blue)}
.nav-item .icon{font-size:18px;width:22px;text-align:center}
.sidebar-user{padding:16px 20px;border-top:1px solid #334155}
.sidebar-user .name{font-size:13px;font-weight:600;color:#E2E8F0}
.sidebar-user .role{font-size:11px;color:#64748B;margin-top:2px}
.sidebar-user .logout{font-size:12px;color:#64748B;cursor:pointer;margin-top:6px;display:inline-block}
.sidebar-user .logout:hover{color:#94A3B8}
.main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid var(--gray-border);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:18px;font-weight:700;color:#1A202C}
.content{padding:28px;flex:1}

/* Cards */
.card{background:#fff;border-radius:12px;border:1px solid var(--gray-border);padding:20px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:12px;border:1px solid var(--gray-border);padding:20px}
.stat-card .value{font-size:32px;font-weight:800;line-height:1}
.stat-card .label{font-size:13px;color:var(--gray);margin-top:6px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;text-decoration:none}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:var(--blue-dark)}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-secondary{background:#F1F5F9;color:#374151;border:1px solid var(--gray-border)}.btn-secondary:hover{background:#E2E8F0}
.btn-sm{padding:5px 12px;font-size:13px}
.btn-xs{padding:3px 8px;font-size:12px}

/* Forms */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
.form-input{width:100%;padding:9px 12px;border:1px solid var(--gray-border);border-radius:8px;font-size:14px;outline:none;transition:border .15s;background:#fff}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.form-select{width:100%;padding:9px 12px;border:1px solid var(--gray-border);border-radius:8px;font-size:14px;outline:none;background:#fff}
.form-textarea{width:100%;padding:9px 12px;border:1px solid var(--gray-border);border-radius:8px;font-size:14px;outline:none;min-height:90px;resize:vertical;background:#fff}
.form-textarea:focus,.form-select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}

/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;padding:10px 14px;font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--gray-border);background:#F8FAFC}
td{padding:12px 14px;border-bottom:1px solid var(--gray-border);vertical-align:middle}
tr:hover td{background:#F8FAFC}
tr:last-child td{border-bottom:none}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600}
.badge-new{background:#EFF6FF;color:#2563EB}
.badge-assigned{background:#F5F3FF;color:#7C3AED}
.badge-in_progress{background:#FFF7ED;color:#C2410C}
.badge-coordination{background:#FEF9C3;color:#854D0E}
.badge-review{background:#F0FDF4;color:#15803D}
.badge-completed{background:#F0FDF4;color:#16A34A}
.badge-rejected{background:#FEF2F2;color:#DC2626}
.badge-pending{background:#F1F5F9;color:#475569}
.priority-high{color:var(--red);font-weight:700}
.priority-medium{color:var(--yellow)}
.priority-low{color:var(--gray)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:16px;max-width:640px;width:100%;max-height:90vh;overflow-y:auto}
.modal-lg{max-width:820px}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--gray-border);display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-size:18px;font-weight:700}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray);padding:0 4px}
.modal-close:hover{color:#1A202C}
.modal-body{padding:20px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--gray-border);display:flex;gap:8px;justify-content:flex-end}

/* Login */
.login-page{min-height:100vh;background:linear-gradient(135deg,#1E293B 0%,#1D4ED8 100%);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:16px;padding:40px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-size:32px;font-weight:900;color:#1E293B}
.login-logo p{font-size:13px;color:var(--gray);margin-top:4px}
.login-tabs{display:flex;gap:0;margin-bottom:20px;border-radius:8px;overflow:hidden;border:1px solid var(--gray-border)}
.login-tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;background:#F8FAFC;color:var(--gray)}
.login-tab.active{background:var(--blue);color:#fff}

/* Alert */
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
.alert-error{background:var(--red-light);color:var(--red);border:1px solid #FECACA}
.alert-success{background:var(--green-light);color:var(--green);border:1px solid #BBF7D0}
.alert-info{background:var(--blue-light);color:var(--blue);border:1px solid #BFDBFE}

/* Filters */
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.filter-chip{padding:5px 14px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid var(--gray-border);background:#fff;color:var(--gray);transition:all .15s}
.filter-chip.active{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
.search-input{padding:7px 12px;border:1px solid var(--gray-border);border-radius:8px;font-size:14px;outline:none;min-width:220px}
.search-input:focus{border-color:var(--blue)}

/* Schedule */
.schedule-grid{display:grid;grid-template-columns:120px repeat(7,1fr);gap:0;border:1px solid var(--gray-border);border-radius:8px;overflow:hidden;font-size:13px}
.sched-header{background:#F8FAFC;padding:8px;text-align:center;font-weight:700;border-bottom:1px solid var(--gray-border);border-right:1px solid var(--gray-border)}
.sched-cell{padding:6px;border-right:1px solid var(--gray-border);border-bottom:1px solid var(--gray-border);min-height:60px;background:#fff;vertical-align:top;position:relative}
.sched-cell:last-child{border-right:none}
.sched-event{background:var(--blue-light);color:var(--blue);border-left:3px solid var(--blue);padding:3px 6px;border-radius:4px;font-size:11px;margin-bottom:2px;cursor:pointer}
.sched-event:hover{background:#DBEAFE}

/* Progress bar */
.progress-bar{height:6px;background:#E5E7EB;border-radius:999px;overflow:hidden}
.progress-fill{height:100%;background:var(--blue);border-radius:999px;transition:width .3s}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--gray-border);margin-bottom:20px}
.tab{padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer;color:var(--gray);border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab:hover:not(.active){color:#374151}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--gray)}
.empty .icon{font-size:48px;margin-bottom:12px}
.empty h3{font-size:18px;font-weight:700;color:#374151;margin-bottom:6px}

/* Notification dot */
.notif-dot{display:inline-block;width:8px;height:8px;background:var(--red);border-radius:50%;margin-left:6px}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2px solid #E5E7EB;border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite}

/* Coord status */
.coord-pending{color:var(--yellow)}
.coord-sent{color:var(--blue)}
.coord-approved{color:var(--green)}
.coord-rejected{color:var(--red)}
</style>
</head>
<body>
<div id="root"><p style="padding:20px;font-family:sans-serif;color:#666">Kraunama...</p></div>
<script>
window.onerror = function(msg, src, line, col, err) {
  document.getElementById('root').innerHTML =
    '<pre style="color:red;background:#fff;padding:24px;font-size:13px">' +
    'JS klaida: ' + msg + '\nFailas: ' + src + ':' + line + '\n\n' + (err&&err.stack||'') + '</pre>';
};
</script>
<script type="text/babel" data-presets="jsx">
const { useState, useEffect, useCallback, useRef } = React;

// ── Constants ─────────────────────────────────────────────────
const STATUSES = [
  { key:'new',         label:'Nauja',         cls:'badge-new' },
  { key:'assigned',    label:'Priskirta',      cls:'badge-assigned' },
  { key:'in_progress', label:'Vykdoma',        cls:'badge-in_progress' },
  { key:'coordination',label:'Derinimas',      cls:'badge-coordination' },
  { key:'review',      label:'Tikrinama',      cls:'badge-review' },
  { key:'completed',   label:'Baigta',         cls:'badge-completed' },
  { key:'rejected',    label:'Atmesta',        cls:'badge-rejected' },
];
const STATUS_LABELS = Object.fromEntries(STATUSES.map(s => [s.key, s.label]));
const STATUS_CLS    = Object.fromEntries(STATUSES.map(s => [s.key, s.cls]));
const PRIORITIES = ['Aukštas','Vidutinis','Žemas'];
const ROLE_LABELS = { admin:'Komandos vadovas', designer:'Projektuotojas', pending:'Laukiama rolės' };
const VERSION = '1.1.4';

// ── API helpers ───────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers:{'Content-Type':'application/json'} };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
  return data;
}
const GET  = (p)    => api('GET',    p);
const POST = (p,b)  => api('POST',   p, b);
const PUT  = (p,b)  => api('PUT',    p, b);
const PATCH= (p,b)  => api('PATCH',  p, b);
const DEL  = (p)    => api('DELETE', p);

// ── Session ───────────────────────────────────────────────────
function loadSession() { try { return JSON.parse(localStorage.getItem('pp-session') || 'null'); } catch { return null; } }
function saveSession(u) { localStorage.setItem('pp-session', JSON.stringify(u)); }
function clearSession()  { localStorage.removeItem('pp-session'); }

// ── Helpers ───────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function fmt(iso) { if(!iso) return '—'; const d=new Date(iso); return d.toLocaleDateString('lt-LT'); }
function fmtDt(iso) { if(!iso) return '—'; const d=new Date(iso); return d.toLocaleString('lt-LT'); }
function daysLeft(deadline) {
  if(!deadline) return null;
  const d = Math.ceil((new Date(deadline) - new Date()) / 86400000);
  return d;
}
function Badge({ status }) {
  return <span className={`badge ${STATUS_CLS[status]||'badge-pending'}`}>{STATUS_LABELS[status]||status}</span>;
}
function PriorityIcon({ p }) {
  if(p==='Aukštas') return <span className="priority-high">↑ Aukštas</span>;
  if(p==='Žemas')   return <span className="priority-low">↓ Žemas</span>;
  return <span className="priority-medium">→ Vidutinis</span>;
}
function Spinner() { return <div className="spinner"/>; }

// ── Login Page ────────────────────────────────────────────────
function LoginPage({ onLogin }) {
  const [tab, setTab] = useState('local');
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  async function submit(e) {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const endpoint = tab === 'ad' ? '/api/auth/ldap' : '/api/auth/local';
      const { user } = await POST(endpoint, { username, password });
      saveSession(user);
      onLogin(user);
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  return (
    <div className="login-page">
      <div className="login-card">
        <div className="login-logo">
          <h1>🏗️ Propoint</h1>
          <p>Projektuotojų užduočių valdymo sistema</p>
        </div>
        <div className="login-tabs">
          <div className={`login-tab ${tab==='local'?'active':''}`} onClick={()=>setTab('local')}>Vietinis</div>
          <div className={`login-tab ${tab==='ad'?'active':''}`} onClick={()=>setTab('ad')}>AD / Windows</div>
        </div>
        {error && <div className="alert alert-error">⚠ {error}</div>}
        <form onSubmit={submit}>
          <div className="form-group">
            <label className="form-label">Vartotojo vardas</label>
            <input className="form-input" value={username} onChange={e=>setUsername(e.target.value)} autoFocus required/>
          </div>
          <div className="form-group">
            <label className="form-label">Slaptažodis</label>
            <input className="form-input" type="password" value={password} onChange={e=>setPassword(e.target.value)} required/>
          </div>
          <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} disabled={loading}>
            {loading ? <Spinner/> : '🔐 Prisijungti'}
          </button>
        </form>
        <p style={{textAlign:'center',fontSize:'11px',color:'#94A3B8',marginTop:'16px'}}>v{VERSION}</p>
      </div>
    </div>
  );
}

// ── Change Password Modal ─────────────────────────────────────
function ChangePasswordModal({ user, forced, onDone, onClose }) {
  const [oldPw, setOldPw] = useState('');
  const [newPw, setNewPw] = useState('');
  const [newPw2, setNewPw2] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  async function submit(e) {
    e.preventDefault();
    if(newPw !== newPw2) { setError('Slaptažodžiai nesutampa.'); return; }
    setError(''); setLoading(true);
    try {
      const { user: updated } = await POST('/api/auth/change-password', { userId:user.id, oldPassword:oldPw, newPassword:newPw });
      saveSession(updated);
      onDone(updated);
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  return (
    <div className="modal-overlay">
      <div className="modal">
        <div className="modal-header">
          <h2>🔑 {forced ? 'Privalomas slaptažodžio keitimas' : 'Keisti slaptažodį'}</h2>
          {!forced && <button className="modal-close" onClick={onClose}>×</button>}
        </div>
        <div className="modal-body">
          {forced && <div className="alert alert-info">Prieš tęsiant reikia pakeisti slaptažodį.</div>}
          {error && <div className="alert alert-error">{error}</div>}
          <form onSubmit={submit}>
            {!forced && (
              <div className="form-group">
                <label className="form-label">Dabartinis slaptažodis</label>
                <input className="form-input" type="password" value={oldPw} onChange={e=>setOldPw(e.target.value)} required/>
              </div>
            )}
            <div className="form-group">
              <label className="form-label">Naujas slaptažodis</label>
              <input className="form-input" type="password" value={newPw} onChange={e=>setNewPw(e.target.value)} required/>
            </div>
            <div className="form-group">
              <label className="form-label">Pakartokite naują slaptažodį</label>
              <input className="form-input" type="password" value={newPw2} onChange={e=>setNewPw2(e.target.value)} required/>
            </div>
            <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} disabled={loading}>
              {loading ? <Spinner/> : '💾 Išsaugoti'}
            </button>
          </form>
        </div>
      </div>
    </div>
  );
}

// ── Pending Role Page ──────────────────────────────────────
function PendingPage({ user, onLogout }) {
  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#F0F4F8'}}>
      <div className="card" style={{maxWidth:400,textAlign:'center',padding:'40px'}}>
        <div style={{fontSize:48,marginBottom:16}}>⏳</div>
        <h2 style={{marginBottom:8}}>Laukiama rolės priskyrimo</h2>
        <p style={{color:'var(--gray)',fontSize:14,marginBottom:24}}>
          Sveiki, <strong>{user.name}</strong>! Jūsų paskyra sėkmingai sukurta.
          Komandos vadovas turi priskirti jums rolę prieš pradedant darbą.
        </p>
        <button className="btn btn-secondary" onClick={onLogout}>Atsijungti</button>
      </div>
    </div>
  );
}

// ── New / Edit Task Modal ─────────────────────────────────────
function TaskModal({ task, onSave, onClose }) {
  const isEdit = !!task;
  const [form, setForm] = useState(task || {
    name:'', projectNumber:'', address:'', client:'',
    description:'', deadline:'', priority:'Vidutinis', type:''
  });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  async function save(e) {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      if(isEdit) {
        await PATCH(`/api/tasks/${task.id}`, form);
      } else {
        await POST('/api/tasks', { ...form, id:uid(), status:'new', createdAt:new Date().toISOString() });
      }
      onSave();
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  return (
    <div className="modal-overlay">
      <div className="modal modal-lg">
        <div className="modal-header">
          <h2>{isEdit ? '✏️ Redaguoti užduotį' : '➕ Nauja užduotis'}</h2>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          {error && <div className="alert alert-error">{error}</div>}
          <form onSubmit={save}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
              <div className="form-group" style={{gridColumn:'1/-1'}}>
                <label className="form-label">Užduoties pavadinimas *</label>
                <input className="form-input" value={form.name} onChange={e=>set('name',e.target.value)} required/>
              </div>
              <div className="form-group">
                <label className="form-label">Projekto Nr.</label>
                <input className="form-input" value={form.projectNumber} onChange={e=>set('projectNumber',e.target.value)}/>
              </div>
              <div className="form-group">
                <label className="form-label">Užsakovas</label>
                <input className="form-input" value={form.client} onChange={e=>set('client',e.target.value)}/>
              </div>
              <div className="form-group" style={{gridColumn:'1/-1'}}>
                <label className="form-label">Objekto adresas</label>
                <input className="form-input" value={form.address} onChange={e=>set('address',e.target.value)}/>
              </div>
              <div className="form-group">
                <label className="form-label">Darbų tipas</label>
                <input className="form-input" placeholder="pvz. ES sujungimas" value={form.type} onChange={e=>set('type',e.target.value)}/>
              </div>
              <div className="form-group">
                <label className="form-label">Prioritetas</label>
                <select className="form-select" value={form.priority} onChange={e=>set('priority',e.target.value)}>
                  {PRIORITIES.map(p=><option key={p}>{p}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Terminas</label>
                <input className="form-input" type="date" value={form.deadline} onChange={e=>set('deadline',e.target.value)}/>
              </div>
              <div className="form-group" style={{gridColumn:'1/-1'}}>
                <label className="form-label">Pastabos / aprašymas</label>
                <textarea className="form-textarea" value={form.description} onChange={e=>set('description',e.target.value)}/>
              </div>
            </div>
            <div className="modal-footer" style={{padding:0,border:0,marginTop:4}}>
              <button type="button" className="btn btn-secondary" onClick={onClose}>Atšaukti</button>
              <button type="submit" className="btn btn-primary" disabled={loading}>{loading?<Spinner/>:'💾 Išsaugoti'}</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  );
}

// ── Assign Modal ──────────────────────────────────────────────
function AssignModal({ task, designers, currentUser, onSave, onClose }) {
  const [designerId, setDesignerId] = useState(task.assignedTo || '');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  async function save(e) {
    e.preventDefault();
    if(!designerId) { setError('Pasirinkite projektuotoją.'); return; }
    setError(''); setLoading(true);
    try {
      await POST(`/api/tasks/${task.id}/assign`, { designerId, assignedBy: currentUser.name });
      onSave();
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  return (
    <div className="modal-overlay">
      <div className="modal">
        <div className="modal-header">
          <h2>👤 Priskirti projektuotoją</h2>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <p style={{fontSize:14,color:'var(--gray)',marginBottom:16}}>Užduotis: <strong>{task.name}</strong></p>
          {error && <div className="alert alert-error">{error}</div>}
          <form onSubmit={save}>
            <div className="form-group">
              <label className="form-label">Projektuotojas</label>
              <select className="form-select" value={designerId} onChange={e=>setDesignerId(e.target.value)}>
                <option value="">— Pasirinkite —</option>
                {designers.map(d=><option key={d.id} value={d.id}>{d.name} ({d.email||'be el. pašto'})</option>)}
              </select>
            </div>
            <div className="modal-footer" style={{padding:0,border:0}}>
              <button type="button" className="btn btn-secondary" onClick={onClose}>Atšaukti</button>
              <button type="submit" className="btn btn-primary" disabled={loading}>{loading?<Spinner/>:'✅ Priskirti ir siųsti laišką'}</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  );
}

// ── Task Detail Modal ─────────────────────────────────────────
function TaskDetailModal({ task, users, currentUser, onUpdate, onClose }) {
  const isAdmin = currentUser.role === 'admin';
  const [status, setStatus] = useState(task.status);
  const [note, setNote] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [success, setSuccess] = useState('');
  const [coordTab, setCoordTab] = useState('list');
  const [coordinations, setCoordinations] = useState([]);
  const [coordLoading, setCoordLoading] = useState(true);

  useEffect(()=>{
    GET('/api/coordinations').then(list=>{
      setCoordinations(list.filter(c=>c.taskId===task.id));
      setCoordLoading(false);
    }).catch(()=>setCoordLoading(false));
  },[task.id]);

  const designer = users.find(u=>u.id===task.assignedTo);

  async function saveStatus() {
    setError(''); setLoading(true);
    try {
      await PATCH(`/api/tasks/${task.id}`, { status, notes: note ? [...(task.notes||[]), { text:note, by:currentUser.name, at:new Date().toISOString() }] : task.notes });
      setSuccess('Statusas išsaugotas.');
      onUpdate();
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  const dl = daysLeft(task.deadline);

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-lg">
        <div className="modal-header">
          <div>
            <h2 style={{marginBottom:4}}>{task.name}</h2>
            <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
              <Badge status={task.status}/>
              {task.priority && <PriorityIcon p={task.priority}/>}
              {task.projectNumber && <span style={{fontSize:12,color:'var(--gray)'}}>#{task.projectNumber}</span>}
            </div>
          </div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px 16px',fontSize:14,marginBottom:20}}>
            <div><span style={{color:'var(--gray)'}}>Adresas:</span> <strong>{task.address||'—'}</strong></div>
            <div><span style={{color:'var(--gray)'}}>Užsakovas:</span> <strong>{task.client||'—'}</strong></div>
            <div><span style={{color:'var(--gray)'}}>Tipas:</span> <strong>{task.type||'—'}</strong></div>
            <div><span style={{color:'var(--gray)'}}>Terminas:</span> <strong style={{color:dl!==null&&dl<0?'var(--red)':dl!==null&&dl<=3?'var(--yellow)':undefined}}>
              {task.deadline||'—'} {dl!==null&&`(${dl<0?'pavėluota '+Math.abs(dl)+' d.':dl===0?'šiandien':'liko '+dl+' d.'})`}
            </strong></div>
            <div><span style={{color:'var(--gray)'}}>Projektuotojas:</span> <strong>{designer?designer.name:'Nepriskirtas'}</strong></div>
            <div><span style={{color:'var(--gray)'}}>Sukurta:</span> <strong>{fmt(task.createdAt)}</strong></div>
          </div>
          {task.description && <div style={{background:'#F8FAFC',border:'1px solid var(--gray-border)',borderRadius:8,padding:'12px',fontSize:13,marginBottom:16}}>{task.description}</div>}

          <div className="tabs">
            <div className={`tab ${coordTab==='status'?'active':''}`} onClick={()=>setCoordTab('status')}>📊 Statusas</div>
            <div className={`tab ${coordTab==='list'?'active':''}`} onClick={()=>setCoordTab('list')}>📨 Derinimai ({coordinations.length})</div>
            <div className={`tab ${coordTab==='notes'?'active':''}`} onClick={()=>setCoordTab('notes')}>📝 Pastabos ({(task.notes||[]).length})</div>
          </div>

          {coordTab==='status' && (
            <div>
              {error && <div className="alert alert-error">{error}</div>}
              {success && <div className="alert alert-success">{success}</div>}
              {(isAdmin || currentUser.id===task.assignedTo) && (
                <>
                  <div className="form-group">
                    <label className="form-label">Keisti statusą</label>
                    <select className="form-select" value={status} onChange={e=>setStatus(e.target.value)}>
                      {STATUSES.map(s=><option key={s.key} value={s.key}>{s.label}</option>)}
                    </select>
                  </div>
                  <div className="form-group">
                    <label className="form-label">Pastaba (neprivaloma)</label>
                    <textarea className="form-textarea" style={{minHeight:60}} value={note} onChange={e=>setNote(e.target.value)} placeholder="Pakeitimo komentaras..."/>
                  </div>
                  <button className="btn btn-primary btn-sm" onClick={saveStatus} disabled={loading}>{loading?<Spinner/>:'💾 Išsaugoti'}</button>
                </>
              )}
            </div>
          )}

          {coordTab==='list' && (
            <div>
              {coordLoading ? <Spinner/> : coordinations.length === 0 ? (
                <div className="empty" style={{padding:'30px 0'}}><div className="icon">📭</div><p>Derinimų nėra</p></div>
              ) : (
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {coordinations.map(c=>(
                    <div key={c.id} style={{border:'1px solid var(--gray-border)',borderRadius:8,padding:'12px'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                        <strong style={{fontSize:14}}>{c.institution}</strong>
                        <span className={`badge badge-${c.status||'pending'}`}>{c.status==='sent'?'Išsiųsta':c.status==='approved'?'Suderinta':c.status==='rejected'?'Atmesta':'Laukiama'}</span>
                      </div>
                      <div style={{fontSize:12,color:'var(--gray)'}}>{c.email} · {fmt(c.createdAt)}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {coordTab==='notes' && (
            <div>
              {(task.notes||[]).length===0 ? (
                <div className="empty" style={{padding:'30px 0'}}><div className="icon">📝</div><p>Pastabų nėra</p></div>
              ) : (
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {(task.notes||[]).map((n,i)=>(
                    <div key={i} style={{border:'1px solid var(--gray-border)',borderRadius:8,padding:'10px 12px'}}>
                      <div style={{fontSize:13}}>{n.text}</div>
                      <div style={{fontSize:11,color:'var(--gray)',marginTop:4}}>{n.by} · {fmtDt(n.at)}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Tasks Page ────────────────────────────────────────────────
function TasksPage({ currentUser, users, tasks, onRefresh }) {
  const isAdmin = currentUser.role === 'admin';
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(null);
  const [assigning, setAssigning] = useState(null);
  const [creating, setCreating] = useState(false);
  const [editing, setEditing] = useState(null);
  const [deleting, setDeleting] = useState(null);
  const designers = users.filter(u=>u.role==='designer');

  // Handle URL hash navigation
  useEffect(()=>{
    const hash = window.location.hash;
    if(hash.startsWith('#task=')) {
      const id = decodeURIComponent(hash.slice(6));
      const t = tasks.find(t=>t.id===id);
      if(t) setSelected(t);
    }
  },[tasks]);

  const visible = tasks.filter(t => {
    if(!isAdmin && t.assignedTo !== currentUser.id) return false;
    if(filter !== 'all' && t.status !== filter) return false;
    if(search) {
      const q = search.toLowerCase();
      return (t.name||'').toLowerCase().includes(q) || (t.address||'').toLowerCase().includes(q) || (t.projectNumber||'').toLowerCase().includes(q) || (t.client||'').toLowerCase().includes(q);
    }
    return true;
  });

  async function deleteTask(id) {
    if(!window.confirm('Tikrai ištrinti užduotį?')) return;
    try { await DEL(`/api/tasks/${id}`); onRefresh(); } catch(e) { alert(e.message); }
  }

  const statusCounts = {};
  STATUSES.forEach(s => { statusCounts[s.key] = tasks.filter(t => isAdmin ? t.status===s.key : t.assignedTo===currentUser.id&&t.status===s.key).length; });

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <h2 style={{fontSize:20,fontWeight:700}}>📋 Užduotys</h2>
        {isAdmin && <button className="btn btn-primary" onClick={()=>setCreating(true)}>➕ Nauja užduotis</button>}
      </div>

      <div className="filters">
        <input className="search-input" placeholder="🔍 Ieškoti..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <div className={`filter-chip ${filter==='all'?'active':''}`} onClick={()=>setFilter('all')}>Visos ({tasks.filter(t=>!isAdmin?t.assignedTo===currentUser.id:true).length})</div>
        {STATUSES.map(s=>{
          const cnt = statusCounts[s.key];
          if(!isAdmin && cnt===0) return null;
          return <div key={s.key} className={`filter-chip ${filter===s.key?'active':''}`} onClick={()=>setFilter(s.key)}>{s.label} ({cnt})</div>;
        })}
      </div>

      <div className="card" style={{padding:0}}>
        {visible.length === 0 ? (
          <div className="empty"><div className="icon">📭</div><h3>Užduočių nėra</h3><p>Nėra užduočių pagal pasirinktus filtrus</p></div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Pavadinimas</th>
                  <th>Projekto Nr.</th>
                  <th>Adresas</th>
                  {isAdmin && <th>Projektuotojas</th>}
                  <th>Prioritetas</th>
                  <th>Terminas</th>
                  <th>Statusas</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {visible.map(t=>{
                  const dl = daysLeft(t.deadline);
                  const designer = users.find(u=>u.id===t.assignedTo);
                  return (
                    <tr key={t.id} style={{cursor:'pointer'}} onClick={()=>setSelected(t)}>
                      <td><strong>{t.name}</strong>{t.client&&<div style={{fontSize:12,color:'var(--gray)'}}>{t.client}</div>}</td>
                      <td>{t.projectNumber||'—'}</td>
                      <td style={{maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.address||'—'}</td>
                      {isAdmin && <td>{designer?designer.name:<span style={{color:'var(--red)',fontSize:12}}>Nepriskirtas</span>}</td>}
                      <td><PriorityIcon p={t.priority}/></td>
                      <td>
                        <span style={{color:dl!==null&&dl<0?'var(--red)':dl!==null&&dl<=3?'var(--yellow)':undefined,fontWeight:dl!==null&&dl<=3?700:undefined}}>
                          {t.deadline||'—'}
                        </span>
                      </td>
                      <td><Badge status={t.status}/></td>
                      <td onClick={e=>e.stopPropagation()}>
                        <div style={{display:'flex',gap:4}}>
                          {isAdmin && !t.assignedTo && <button className="btn btn-xs btn-primary" onClick={()=>setAssigning(t)}>👤 Priskirti</button>}
                          {isAdmin && t.assignedTo && <button className="btn btn-xs btn-secondary" onClick={()=>setAssigning(t)}>👤</button>}
                          {isAdmin && <button className="btn btn-xs btn-secondary" onClick={()=>setEditing(t)}>✏️</button>}
                          {isAdmin && <button className="btn btn-xs btn-danger" onClick={()=>deleteTask(t.id)}>🗑</button>}
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {selected && <TaskDetailModal task={selected} users={users} currentUser={currentUser} onUpdate={()=>{onRefresh();setSelected(null);}} onClose={()=>setSelected(null)}/>}
      {assigning && <AssignModal task={assigning} designers={designers} currentUser={currentUser} onSave={()=>{onRefresh();setAssigning(null);}} onClose={()=>setAssigning(null)}/>}
      {creating && <TaskModal onSave={()=>{onRefresh();setCreating(false);}} onClose={()=>setCreating(false)}/>}
      {editing && <TaskModal task={editing} onSave={()=>{onRefresh();setEditing(null);}} onClose={()=>setEditing(null)}/>}
    </div>
  );
}

// ── Dashboard ─────────────────────────────────────────────────
function DashboardPage({ currentUser, tasks, users }) {
  const isAdmin = currentUser.role === 'admin';
  const myTasks = isAdmin ? tasks : tasks.filter(t=>t.assignedTo===currentUser.id);
  const active  = myTasks.filter(t=>!['completed','rejected'].includes(t.status));
  const overdue = myTasks.filter(t=>{
    if(['completed','rejected'].includes(t.status)||!t.deadline) return false;
    return daysLeft(t.deadline) < 0;
  });
  const dueSoon = myTasks.filter(t=>{
    if(['completed','rejected'].includes(t.status)||!t.deadline) return false;
    const d = daysLeft(t.deadline);
    return d !== null && d >= 0 && d <= 3;
  });
  const completed = myTasks.filter(t=>t.status==='completed').length;

  return (
    <div>
      <div style={{marginBottom:24}}>
        <h2 style={{fontSize:22,fontWeight:800}}>👋 Sveiki, {currentUser.name.split(' ')[0]}!</h2>
        <p style={{color:'var(--gray)',fontSize:14,marginTop:4}}>{new Date().toLocaleDateString('lt-LT',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p>
      </div>

      <div className="stat-grid">
        <div className="stat-card">
          <div className="value" style={{color:'var(--blue)'}}>{active.length}</div>
          <div className="label">📋 Aktyvios užduotys</div>
        </div>
        <div className="stat-card">
          <div className="value" style={{color:'var(--red)'}}>{overdue.length}</div>
          <div className="label">⚠️ Pavėluotos</div>
        </div>
        <div className="stat-card">
          <div className="value" style={{color:'var(--yellow)'}}>{dueSoon.length}</div>
          <div className="label">⏰ Artėja terminas</div>
        </div>
        <div className="stat-card">
          <div className="value" style={{color:'var(--green)'}}>{completed}</div>
          <div className="label">✅ Baigtos</div>
        </div>
        {isAdmin && (
          <div className="stat-card">
            <div className="value" style={{color:'var(--purple)'}}>{users.filter(u=>u.role==='designer').length}</div>
            <div className="label">👥 Projektuotojai</div>
          </div>
        )}
        {isAdmin && (
          <div className="stat-card">
            <div className="value" style={{color:'var(--gray)'}}>{tasks.filter(t=>!t.assignedTo&&t.status==='new').length}</div>
            <div className="label">📥 Nepriskirtos</div>
          </div>
        )}
      </div>

      {overdue.length > 0 && (
        <div className="card" style={{borderColor:'#FECACA',marginBottom:16}}>
          <h3 style={{fontSize:15,fontWeight:700,color:'var(--red)',marginBottom:12}}>⚠️ Pavėluotos užduotys</h3>
          {overdue.slice(0,5).map(t=>{
            const dl = daysLeft(t.deadline);
            const designer = users.find(u=>u.id===t.assignedTo);
            return (
              <div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--gray-border)'}}>
                <div>
                  <div style={{fontWeight:600,fontSize:14}}>{t.name}</div>
                  <div style={{fontSize:12,color:'var(--gray)'}}>{t.address||t.client} {isAdmin&&designer&&`· ${designer.name}`}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{color:'var(--red)',fontWeight:700,fontSize:13}}>Pavėluota {Math.abs(dl)} d.</div>
                  <Badge status={t.status}/>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {dueSoon.length > 0 && (
        <div className="card" style={{borderColor:'#FDE68A',marginBottom:16}}>
          <h3 style={{fontSize:15,fontWeight:700,color:'var(--yellow)',marginBottom:12}}>⏰ Artėjantys terminai (≤3 dienos)</h3>
          {dueSoon.map(t=>{
            const dl = daysLeft(t.deadline);
            const designer = users.find(u=>u.id===t.assignedTo);
            return (
              <div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--gray-border)'}}>
                <div>
                  <div style={{fontWeight:600,fontSize:14}}>{t.name}</div>
                  <div style={{fontSize:12,color:'var(--gray)'}}>{t.address||t.client} {isAdmin&&designer&&`· ${designer.name}`}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{color:'var(--yellow)',fontWeight:700,fontSize:13}}>{dl===0?'Šiandien':`Liko ${dl} d.`}</div>
                  <Badge status={t.status}/>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {isAdmin && tasks.filter(t=>!t.assignedTo&&t.status==='new').length > 0 && (
        <div className="card" style={{borderColor:'#BFDBFE'}}>
          <h3 style={{fontSize:15,fontWeight:700,color:'var(--blue)',marginBottom:12}}>📥 Nepriskirtos užduotys</h3>
          {tasks.filter(t=>!t.assignedTo&&t.status==='new').slice(0,5).map(t=>(
            <div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--gray-border)'}}>
              <div>
                <div style={{fontWeight:600,fontSize:14}}>{t.name}</div>
                <div style={{fontSize:12,color:'var(--gray)'}}>{t.address||t.client}</div>
              </div>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                <div style={{fontSize:12,color:'var(--gray)'}}>{fmt(t.createdAt)}</div>
                <Badge status={t.status}/>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Coordination Modal ────────────────────────────────────────
function NewCoordModal({ tasks, currentUser, onSave, onClose }) {
  const [form, setForm] = useState({ taskId:'', institution:'', email:'', subject:'', body:'' });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const set = (k,v)=>setForm(f=>({...f,[k]:v}));

  const myTasks = tasks.filter(t=>currentUser.role==='admin'||t.assignedTo===currentUser.id).filter(t=>!['completed','rejected'].includes(t.status));

  async function submit(e) {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const coord = { ...form, id:uid(), status:'pending', createdBy:currentUser.id, createdByName:currentUser.name, createdAt:new Date().toISOString() };
      await POST('/api/coordinations', coord);
      if(window.confirm('Išsaugota. Siųsti laišką institucijai dabar?')) {
        await POST(`/api/coordinations/${coord.id}/send`, { to:form.email, subject:form.subject, body:`<p>${form.body.replace(/\n/g,'<br/>')}</p><p style="color:#888;font-size:12px;margin-top:20px">— Propoint, ${currentUser.name}</p>` });
      }
      onSave();
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  return (
    <div className="modal-overlay">
      <div className="modal modal-lg">
        <div className="modal-header">
          <h2>📨 Naujas derinimas</h2>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          {error && <div className="alert alert-error">{error}</div>}
          <form onSubmit={submit}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
              <div className="form-group" style={{gridColumn:'1/-1'}}>
                <label className="form-label">Užduotis</label>
                <select className="form-select" value={form.taskId} onChange={e=>set('taskId',e.target.value)} required>
                  <option value="">— Pasirinkite užduotį —</option>
                  {myTasks.map(t=><option key={t.id} value={t.id}>{t.name} {t.address?`— ${t.address}`:''}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Institucija</label>
                <input className="form-input" value={form.institution} onChange={e=>set('institution',e.target.value)} required placeholder="pvz. AB ESO"/>
              </div>
              <div className="form-group">
                <label className="form-label">El. paštas</label>
                <input className="form-input" type="email" value={form.email} onChange={e=>set('email',e.target.value)} required/>
              </div>
              <div className="form-group" style={{gridColumn:'1/-1'}}>
                <label className="form-label">Laiško tema</label>
                <input className="form-input" value={form.subject} onChange={e=>set('subject',e.target.value)} required placeholder="Derinimo prašymas..."/>
              </div>
              <div className="form-group" style={{gridColumn:'1/-1'}}>
                <label className="form-label">Laiško turinys</label>
                <textarea className="form-textarea" style={{minHeight:120}} value={form.body} onChange={e=>set('body',e.target.value)} required placeholder="Laiško tekstas..."/>
              </div>
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:4}}>
              <button type="button" className="btn btn-secondary" onClick={onClose}>Atšaukti</button>
              <button type="submit" className="btn btn-primary" disabled={loading}>{loading?<Spinner/>:'💾 Išsaugoti'}</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  );
}

// ── Coordinations Page ────────────────────────────────────────
function CoordinationsPage({ currentUser, tasks }) {
  const [list, setList] = useState([]);
  const [loading, setLoading] = useState(true);
  const [creating, setCreating] = useState(false);
  const [filter, setFilter] = useState('all');

  const load = () => {
    setLoading(true);
    GET('/api/coordinations').then(data=>{
      const mine = currentUser.role==='admin' ? data : data.filter(c=>c.createdBy===currentUser.id);
      setList(mine);
      setLoading(false);
    }).catch(()=>setLoading(false));
  };
  useEffect(load,[]);

  async function updateStatus(id, status) {
    try { await PATCH(`/api/coordinations/${id}`, { status }); load(); } catch(e) { alert(e.message); }
  }

  async function resend(c) {
    if(!window.confirm(`Siųsti laišką į ${c.email}?`)) return;
    try {
      await POST(`/api/coordinations/${c.id}/send`, { to:c.email, subject:c.subject, body:`<p>${(c.body||'').replace(/\n/g,'<br/>')}</p>` });
      alert('Laiškas išsiųstas!');
      load();
    } catch(e) { alert(e.message); }
  }

  const filtered = list.filter(c => filter==='all' || c.status===filter);
  const task = (c) => tasks.find(t=>t.id===c.taskId);

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <h2 style={{fontSize:20,fontWeight:700}}>📨 Derinimai</h2>
        <button className="btn btn-primary" onClick={()=>setCreating(true)}>➕ Naujas derinimas</button>
      </div>

      <div className="filters">
        {[['all','Visi'],['pending','Laukiama'],['sent','Išsiųsta'],['approved','Suderinta'],['rejected','Atmesta']].map(([k,l])=>(
          <div key={k} className={`filter-chip ${filter===k?'active':''}`} onClick={()=>setFilter(k)}>{l} ({k==='all'?list.length:list.filter(c=>c.status===k).length})</div>
        ))}
      </div>

      {loading ? <Spinner/> : (
        <div className="card" style={{padding:0}}>
          {filtered.length===0 ? (
            <div className="empty"><div className="icon">📭</div><h3>Derinimų nėra</h3></div>
          ) : (
            <div className="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Institucija</th>
                    <th>Užduotis</th>
                    <th>El. paštas</th>
                    <th>Tema</th>
                    <th>Sukurta</th>
                    <th>Statusas</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(c=>{
                    const t = task(c);
                    return (
                      <tr key={c.id}>
                        <td><strong>{c.institution}</strong></td>
                        <td style={{fontSize:13}}>{t?t.name:'—'}</td>
                        <td style={{fontSize:13}}>{c.email}</td>
                        <td style={{maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:13}}>{c.subject}</td>
                        <td style={{fontSize:12,color:'var(--gray)'}}>{fmt(c.createdAt)}</td>
                        <td>
                          <select className="form-select" style={{fontSize:12,padding:'4px 8px',width:'auto'}} value={c.status||'pending'} onChange={e=>updateStatus(c.id,e.target.value)}>
                            <option value="pending">Laukiama</option>
                            <option value="sent">Išsiųsta</option>
                            <option value="approved">Suderinta</option>
                            <option value="rejected">Atmesta</option>
                          </select>
                        </td>
                        <td>
                          <button className="btn btn-xs btn-secondary" onClick={()=>resend(c)}>📤 Siųsti</button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}

      {creating && <NewCoordModal tasks={tasks} currentUser={currentUser} onSave={()=>{load();setCreating(false);}} onClose={()=>setCreating(false)}/>}
    </div>
  );
}

// ── Schedule Page ─────────────────────────────────────────────
function SchedulePage({ currentUser, tasks, users }) {
  const [tab, setTab] = useState('tasks');
  const [weekOffset, setWeekOffset] = useState(0);

  const today = new Date();
  const weekStart = new Date(today);
  weekStart.setDate(today.getDate() - today.getDay() + 1 + weekOffset*7);

  const weekDays = Array.from({length:7},(_,i)=>{
    const d = new Date(weekStart); d.setDate(weekStart.getDate()+i);
    return d;
  });

  const tasksInRange = tasks.filter(t=>{
    if(!t.deadline) return false;
    if(currentUser.role!=='admin'&&t.assignedTo!==currentUser.id) return false;
    const dl = new Date(t.deadline);
    return dl >= weekStart && dl <= weekDays[6];
  });

  const designers = users.filter(u=>u.role==='designer');

  function dayLabel(d) {
    return d.toLocaleDateString('lt-LT',{weekday:'short',day:'numeric',month:'numeric'});
  }

  function tasksForDay(day) {
    return tasksInRange.filter(t=>{
      if(!t.deadline) return false;
      const dl = new Date(t.deadline);
      return dl.getDate()===day.getDate()&&dl.getMonth()===day.getMonth()&&dl.getFullYear()===day.getFullYear();
    });
  }

  function designerTasksForDay(designer, day) {
    return tasks.filter(t=>{
      if(t.assignedTo!==designer.id||!t.deadline) return false;
      const dl = new Date(t.deadline);
      return dl.getDate()===day.getDate()&&dl.getMonth()===day.getMonth()&&dl.getFullYear()===day.getFullYear();
    });
  }

  const isToday = (d) => {
    const n = new Date();
    return d.getDate()===n.getDate()&&d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();
  };

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <h2 style={{fontSize:20,fontWeight:700}}>📅 Grafikas</h2>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <button className="btn btn-secondary btn-sm" onClick={()=>setWeekOffset(w=>w-1)}>← Ankstesnė</button>
          <button className="btn btn-secondary btn-sm" onClick={()=>setWeekOffset(0)}>Šiandien</button>
          <button className="btn btn-secondary btn-sm" onClick={()=>setWeekOffset(w=>w+1)}>Sekanti →</button>
        </div>
      </div>

      <div className="tabs">
        <div className={`tab ${tab==='tasks'?'active':''}`} onClick={()=>setTab('tasks')}>📋 Užduočių grafikas</div>
        {currentUser.role==='admin' && <div className={`tab ${tab==='team'?'active':''}`} onClick={()=>setTab('team')}>👥 Darbuotojų grafikas</div>}
      </div>

      {tab==='tasks' && (
        <div className="card" style={{overflowX:'auto'}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:8,minWidth:700}}>
            {weekDays.map((d,i)=>(
              <div key={i}>
                <div style={{textAlign:'center',fontWeight:700,fontSize:13,padding:'6px 0',background:isToday(d)?'var(--blue)':'#F8FAFC',color:isToday(d)?'#fff':'var(--gray)',borderRadius:6,marginBottom:6}}>
                  {dayLabel(d)}
                </div>
                {tasksForDay(d).map(t=>{
                  const designer = users.find(u=>u.id===t.assignedTo);
                  return (
                    <div key={t.id} className="sched-event" title={t.name}>
                      <div style={{fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.name}</div>
                      {designer && <div style={{color:'#4B5563'}}>{designer.name.split(' ')[0]}</div>}
                    </div>
                  );
                })}
                {tasksForDay(d).length===0 && <div style={{fontSize:12,color:'#E5E7EB',textAlign:'center',paddingTop:8}}>—</div>}
              </div>
            ))}
          </div>
        </div>
      )}

      {tab==='team' && currentUser.role==='admin' && (
        <div className="card" style={{overflowX:'auto'}}>
          <div style={{display:'grid',gridTemplateColumns:`140px repeat(7,1fr)`,gap:0,minWidth:800,border:'1px solid var(--gray-border)',borderRadius:8,overflow:'hidden'}}>
            <div className="sched-header" style={{borderRight:'1px solid var(--gray-border)'}}>Projektuotojas</div>
            {weekDays.map((d,i)=>(
              <div key={i} className="sched-header" style={{background:isToday(d)?'#DBEAFE':'',color:isToday(d)?'var(--blue)':''}}>{dayLabel(d)}</div>
            ))}
            {designers.map(designer=>(
              <React.Fragment key={designer.id}>
                <div style={{padding:'8px',borderRight:'1px solid var(--gray-border)',borderBottom:'1px solid var(--gray-border)',fontSize:13,fontWeight:600,background:'#F8FAFC'}}>
                  {designer.name}
                </div>
                {weekDays.map((d,i)=>(
                  <div key={i} style={{padding:'4px',borderRight:i<6?'1px solid var(--gray-border)':'none',borderBottom:'1px solid var(--gray-border)',minHeight:50,background:isToday(d)?'#EFF6FF':''}}>
                    {tasks.filter(t=>t.assignedTo===designer.id&&t.deadline&&(()=>{
                      const dl=new Date(t.deadline);
                      return dl.getDate()===d.getDate()&&dl.getMonth()===d.getMonth()&&dl.getFullYear()===d.getFullYear();
                    })()).map(t=>(
                      <div key={t.id} className="sched-event" title={t.name} style={{fontSize:10}}>
                        {t.name.slice(0,20)}{t.name.length>20?'...':''}
                      </div>
                    ))}
                  </div>
                ))}
              </React.Fragment>
            ))}
          </div>
        </div>
      )}

      {/* Upcoming deadlines list */}
      <div style={{marginTop:20}}>
        <h3 style={{fontSize:16,fontWeight:700,marginBottom:12}}>📌 Artimiausi terminai</h3>
        <div className="card" style={{padding:0}}>
          {tasks.filter(t=>{
            if(!t.deadline||['completed','rejected'].includes(t.status)) return false;
            if(currentUser.role!=='admin'&&t.assignedTo!==currentUser.id) return false;
            const dl = daysLeft(t.deadline);
            return dl !== null && dl >= 0 && dl <= 14;
          }).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline)).map(t=>{
            const dl = daysLeft(t.deadline);
            const designer = users.find(u=>u.id===t.assignedTo);
            return (
              <div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 16px',borderBottom:'1px solid var(--gray-border)'}}>
                <div>
                  <div style={{fontWeight:600,fontSize:14}}>{t.name}</div>
                  <div style={{fontSize:12,color:'var(--gray)'}}>{t.address||t.client||''} {designer?`· ${designer.name}`:''}</div>
                </div>
                <div style={{textAlign:'right',minWidth:120}}>
                  <div style={{fontWeight:700,fontSize:13,color:dl<=3?'var(--red)':dl<=7?'var(--yellow)':'var(--green)'}}>
                    {dl===0?'Šiandien':`Liko ${dl} d.`}
                  </div>
                  <div style={{fontSize:12,color:'var(--gray)'}}>{t.deadline}</div>
                </div>
              </div>
            );
          })}
          {tasks.filter(t=>t.deadline&&!['completed','rejected'].includes(t.status)&&(currentUser.role==='admin'||t.assignedTo===currentUser.id)&&daysLeft(t.deadline)<=14&&daysLeft(t.deadline)>=0).length===0 && (
            <div className="empty" style={{padding:'30px 0'}}><div className="icon">🎉</div><p>Artimų terminų nėra</p></div>
          )}
        </div>
      </div>
    </div>
  );
}

function UsersPage({ currentUser }) {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [creating, setCreating] = useState(false);
  const [newUser, setNewUser] = useState({ name:'', email:'', password:'', role:'designer' });
  const [error, setError] = useState('');
  const [success, setSuccess] = useState('');

  const load = () => {
    GET('/api/store/pp-users').then(({value})=>{setUsers(value||[]);setLoading(false);}).catch(()=>setLoading(false));
  };
  useEffect(load,[]);

  async function changeRole(id, role) {
    try { await PATCH(`/api/users/${id}/role`, { role }); setSuccess('Rolė pakeista.'); load(); } catch(e) { setError(e.message); }
  }
  async function deleteUser(id) {
    if(!window.confirm('Tikrai ištrinti vartotoją?')) return;
    try { await DEL(`/api/users/${id}`); load(); } catch(e) { alert(e.message); }
  }
  async function createUser(e) {
    e.preventDefault(); setError('');
    try {
      await POST('/api/users', newUser);
      setSuccess(`Vartotojas ${newUser.name} sukurtas.`);
      setNewUser({ name:'', email:'', password:'', role:'designer' });
      setCreating(false);
      load();
    } catch(e) { setError(e.message); }
  }

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <h2 style={{fontSize:20,fontWeight:700}}>👥 Vartotojai</h2>
        <button className="btn btn-primary" onClick={()=>setCreating(c=>!c)}>➕ Naujas vartotojas</button>
      </div>
      {error && <div className="alert alert-error">{error}</div>}
      {success && <div className="alert alert-success">{success}</div>}

      {creating && (
        <div className="card" style={{marginBottom:16}}>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:12}}>Naujas vartotojas</h3>
          <form onSubmit={createUser}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr auto',gap:'10px',alignItems:'end'}}>
              <div>
                <label className="form-label">Vardas, pavardė</label>
                <input className="form-input" value={newUser.name} onChange={e=>setNewUser(u=>({...u,name:e.target.value}))} required/>
              </div>
              <div>
                <label className="form-label">El. paštas</label>
                <input className="form-input" type="email" value={newUser.email} onChange={e=>setNewUser(u=>({...u,email:e.target.value}))} required/>
              </div>
              <div>
                <label className="form-label">Slaptažodis</label>
                <input className="form-input" value={newUser.password} onChange={e=>setNewUser(u=>({...u,password:e.target.value}))} required/>
              </div>
              <div>
                <label className="form-label">Rolė</label>
                <select className="form-select" value={newUser.role} onChange={e=>setNewUser(u=>({...u,role:e.target.value}))}>
                  <option value="admin">Komandos vadovas</option>
                  <option value="designer">Projektuotojas</option>
                </select>
              </div>
              <button type="submit" className="btn btn-primary btn-sm" style={{height:38}}>✅ Sukurti</button>
              <button type="button" className="btn btn-secondary btn-sm" style={{height:38}} onClick={()=>setCreating(false)}>Atšaukti</button>
            </div>
          </form>
        </div>
      )}

      {loading ? <Spinner/> : (
        <div className="card" style={{padding:0}}>
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Vardas</th>
                  <th>El. paštas</th>
                  <th>Autentikacija</th>
                  <th>Rolė</th>
                  <th>Sukurta</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {users.map(u=>(
                  <tr key={u.id}>
                    <td>
                      <strong>{u.name}</strong>
                      {u.username && <div style={{fontSize:11,color:'var(--gray)'}}>{u.username}</div>}
                    </td>
                    <td style={{fontSize:13}}>{u.email||<span style={{color:'var(--gray)'}}>—</span>}</td>
                    <td><span className="badge" style={{background:u.adAuth?'#EDE9FE':'#F1F5F9',color:u.adAuth?'#7C3AED':'#475569'}}>{u.adAuth?'AD':'Vietinis'}</span></td>
                    <td>
                      {u.id !== currentUser.id ? (
                        <select className="form-select" style={{fontSize:13,padding:'4px 8px',width:'auto'}} value={u.role} onChange={e=>changeRole(u.id,e.target.value)}>
                          <option value="admin">Komandos vadovas</option>
                          <option value="designer">Projektuotojas</option>
                          <option value="pending">Laukiama</option>
                        </select>
                      ) : <span className="badge badge-new">{ROLE_LABELS[u.role]||u.role}</span>}
                    </td>
                    <td style={{fontSize:12,color:'var(--gray)'}}>{fmt(u.createdAt)}</td>
                    <td>
                      {u.id !== currentUser.id && (
                        <button className="btn btn-xs btn-danger" onClick={()=>deleteUser(u.id)}>🗑</button>

          </div>

  );

// ── Main App ──────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(loadSession);
  const [page, setPage] = useState('dashboard');
  const [tasks, setTasks] = useState([]);
  const [users, setUsers] = useState([]);
  const [loadingData, setLoadingData] = useState(true);

  function logout() { clearSession(); setUser(null); }

  const loadTasks = useCallback(()=>{
    GET('/api/tasks').then(setTasks).catch(()=>{});
  },[]);

  const loadUsers = useCallback(()=>{
    GET('/api/store/pp-users').then(({value})=>setUsers(value||[])).catch(()=>{});
  },[]);

  useEffect(()=>{
    if(!user||user.role==='pending') return;
    Promise.all([GET('/api/tasks'),GET('/api/store/pp-users')]).then(([t,{value:u}])=>{
      setTasks(t||[]);
      setUsers(u||[]);
      setLoadingData(false);
    }).catch(()=>setLoadingData(false));
  },[user]);

  // Hash navigation
  useEffect(()=>{
    const hash = window.location.hash;
    if(hash.startsWith('#task=')) setPage('tasks');
  },[]);

  if(!user) return <LoginPage onLogin={u=>{setUser(u);saveSession(u);}}/>;
  if(user.mustChangePassword && !user.adAuth) return <ChangePasswordModal user={user} forced onDone={updated=>{setUser(updated);saveSession(updated);}} onClose={()=>{}}/>;
  if(user.role==='pending') return <PendingPage user={user} onLogout={logout}/>;

  const isAdmin = user.role === 'admin';

  const navItems = [
    { key:'dashboard', icon:'🏠', label:'Pradžia' },
    { key:'tasks',     icon:'📋', label:'Užduotys' },
    { key:'coordinations', icon:'📨', label:'Derinimai' },
    { key:'schedule',  icon:'📅', label:'Grafikas' },
    ...(isAdmin ? [{ key:'users', icon:'👥', label:'Vartotojai' }] : []),
    { key:'settings',  icon:'⚙️', label:'Nustatymai' },
  ];

  const overdueCnt = tasks.filter(t=>{
    if(['completed','rejected'].includes(t.status)||!t.deadline) return false;
    if(!isAdmin&&t.assignedTo!==user.id) return false;
    return daysLeft(t.deadline) < 0;
  }).length;

  function renderPage() {
    if(loadingData) return <div style={{display:'flex',justifyContent:'center',padding:60}}><Spinner/></div>;
    switch(page) {
      case 'dashboard':   return <DashboardPage currentUser={user} tasks={tasks} users={users}/>;
      case 'tasks':       return <TasksPage currentUser={user} users={users} tasks={tasks} onRefresh={()=>{loadTasks();loadUsers();}}/>;
      case 'coordinations': return <CoordinationsPage currentUser={user} tasks={tasks}/>;
      case 'schedule':    return <SchedulePage currentUser={user} tasks={tasks} users={users}/>;
      case 'users':       return isAdmin ? <UsersPage currentUser={user}/> : null;
      case 'settings':    return <SettingsPage currentUser={user}/>;
      default: return null;
    }
  }

  const pageTitles = { dashboard:'Pradžia', tasks:'Užduotys', coordinations:'Derinimai', schedule:'Grafikas', users:'Vartotojai', settings:'Nustatymai' };

  return (
    <div className="layout">
      <div className="sidebar">
        <div className="sidebar-logo">
          <h1>🏗️ Propoint</h1>
          <div className="version">v{VERSION} · {ROLE_LABELS[user.role]||user.role}</div>
        </div>
        <nav className="sidebar-nav">
          {navItems.map(item=>(
            <div key={item.key} className={`nav-item ${page===item.key?'active':''}`} onClick={()=>setPage(item.key)}>
              <span className="icon">{item.icon}</span>
              {item.label}
              {item.key==='tasks'&&overdueCnt>0&&<span className="notif-dot" title={`${overdueCnt} pavėluota`}/>}
            </div>
          ))}
        </nav>
        <div className="sidebar-user">
          <div className="name">{user.name}</div>
          <div className="role">{ROLE_LABELS[user.role]||user.role}</div>
          <div className="logout" onClick={logout}>Atsijungti →</div>
        </div>
      </div>
      <div className="main">
        <div className="topbar">
          <div className="topbar-title">{pageTitles[page]||''}</div>
          <div style={{display:'flex',gap:8,alignItems:'center',fontSize:13,color:'var(--gray)'}}>
            {overdueCnt>0&&<span style={{background:'var(--red-light)',color:'var(--red)',padding:'3px 10px',borderRadius:999,fontWeight:700,fontSize:12}}>⚠️ {overdueCnt} pavėluota</span>}
            <span>{user.name}</span>
          </div>
        </div>
        <div className="content">
          {renderPage()}
        </div>
      </div>
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
} catch(err) {
  document.getElementById('root').innerHTML =
    '<pre style="color:red;background:#fff;padding:24px;font-size:13px">' +
    'Klaida: ' + err.message + '\n\n' + (err.stack||'') + '</pre>';
}
</script>
</body>
</html>
